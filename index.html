<body>
  <hax-the-club>
    <htc-main-screen title="HAX The Club" sid="0"></htc-main-screen>
    <htc-landpage-screen title="Landing" sid="1"></htc-landpage-screen>
    <htc-about-screen title="About" sid="2"></htc-about-screen>
    <htc-team-screen title="Team" sid="3"></htc-team-screen>
    <htc-involved-screen title="Get Involved" sid="4"></htc-involved-screen>
    <htc-resources-screen title="Resources" sid="5"></htc-resources-screen>
  </hax-the-club>

  <htc-footer></htc-footer>

  <script type="module">
    import "./hax-the-club.js";
    import "./lib/htc-screen.js";
    import "./lib/htc-landpage-screen.js";
    import "./lib/htc-main-screen.js";
    import "./lib/htc-about-screen.js";
    import "./lib/htc-team-screen.js";
    import "./lib/htc-involved-screen.js";
    import "./lib/htc-resources-screen.js";
    import "./lib/htc-footer.js";
    import "./lib/example-htc-screen.js";
    import "./lib/tharun-epic-rrr-screen.js";
    import "./lib/synthywavy-htc-screen.js";
    import "@haxtheweb/inline-audio/inline-audio.js";
    import "@haxtheweb/simple-icon/lib/simple-icon-button-lite.js";

    // Navigate when the enter button is clicked
    const observeHomeButton = () => {
      const homeScreen = document.querySelector("htc-home-screen");
      if (homeScreen?.shadowRoot) {
        const btn = homeScreen.shadowRoot.getElementById("home-enter");
        if (btn) {
          btn.addEventListener("click", () => {
            document.querySelector("hax-the-club")?.dispatchEvent(
              new CustomEvent("screen-change", {
                bubbles: true,
                composed: true,
                detail: { direction: 1 },
              })
            );
          });
        }
      } else {
        setTimeout(observeHomeButton, 100);
      }
    };
    observeHomeButton();
  </script>
